<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小虎的畫師日誌 v1.4.7</title>
    <style>
        :root { --admin-gold: #fab005; --danger: #ff4757; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .nav-bar { background: #333; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; }
        
        /* 小小的登入按鈕與彈窗 */
        .login-trigger { cursor: pointer; font-size: 20px; padding: 5px 10px; border-radius: 5px; background: #444; }
        #login-modal { display: none; position: fixed; top: 60px; right: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 101; width: 250px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* 控制台樣式 */
        #admin-panel { display: none; background: #fff9db; border: 2px solid var(--admin-gold); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .control-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; }
        
        /* 內容隱藏邏輯 */
        #main-content { display: none; }
        #lock-screen { text-align: center; padding: 100px 20px; }
        .maintenance-overlay { display: none; text-align: center; color: var(--danger); font-weight: bold; padding: 50px; }
        
        .post-card { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .comment-box { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <strong>🐯 小虎日誌</strong>
    <div class="login-trigger" onclick="toggleModal()">👤</div>
</div>

<div id="login-modal">
    <div id="auth-ui">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()" style="width:100%; background:var(--admin-gold); border:none; padding:10px; cursor:pointer;">登入</button>
    </div>
    <div id="user-info" style="display:none; text-align:center;">
        <p id="user-display" style="font-size:12px;"></p>
        <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:5px 10px; cursor:pointer;">登出</button>
    </div>
</div>

<div class="container">
    <div id="lock-screen">
        <h2>🔒 內容已鎖定</h2>
        <p>請點擊右上角頭像登入，即可閱讀畫師日誌。</p>
    </div>

    <div id="maintenance-msg" class="maintenance-overlay">
        🚧 網站整修中，暫不開放瀏覽與登入 🚧<br>
        請稍後再回來看看！
    </div>

    <div id="admin-panel">
        <h3>🛠️ 神之控制台</h3>
        <div class="control-group">
            <button onclick="toggleConfig('maintenance')">🔧 切換維護模式</button>
            <button onclick="toggleConfig('disableComments')">🚫 關閉全站留言</button>
        </div>
        <div style="margin-top:10px;">
            <input type="text" id="ban-email" placeholder="輸入要禁言的 Email" style="width:70%;">
            <button onclick="banUser()" style="width:25%;">禁言</button>
        </div>
        <textarea id="admin-post" placeholder="發布新貼文..."></textarea>
        <button onclick="createPost()" style="width:100%; background:#2ed573; color:white; border:none; padding:10px;">發布日誌</button>
    </div>

    <div id="main-content">
        <div id="feed"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBK3gZ-lkSPgKGcIs6eQRa-mz2ffl8Os1k",
        authDomain: "blog-f2a36.firebaseapp.com",
        databaseURL: "https://blog-f2a36-default-rtdb.firebaseio.com/",
        projectId: "blog-f2a36",
        storageBucket: "blog-f2a36.appspot.com",
        messagingSenderId: "857805164808",
        appId: "1:857805164808:web:7563148f9368d374f368d3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const ADMIN_EMAIL = "hehans1108@gmail.com";

    window.toggleModal = () => {
        const m = document.getElementById('login-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };

    window.handleAuth = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
    };

    window.logout = () => signOut(auth);

    // 控制台邏輯
    window.toggleConfig = (key) => {
        const r = ref(db, `config/${key}`);
        get(r).then(s => set(r, !s.val()));
    };

    window.banUser = () => {
        const e = document.getElementById('ban-email').value;
        if(e) set(ref(db, `banned/${e.replace(/\./g, '_')}`), true).then(() => alert('已禁言！'));
    };

    window.createPost = () => {
        const c = document.getElementById('admin-post').value;
        if(c) push(ref(db, 'posts'), { text: c, time: new Date().toLocaleString() }).then(() => document.getElementById('admin-post').value = "");
    };

    onAuthStateChanged(auth, (user) => {
        const isAuth = !!user;
        const isAdmin = user && user.email === ADMIN_EMAIL;
        
        document.getElementById('auth-ui').style.display = isAuth ? 'none' : 'block';
        document.getElementById('user-info').style.display = isAuth ? 'block' : 'none';
        if(isAuth) document.getElementById('user-display').innerText = user.email;

        // 全域監聽設定
        onValue(ref(db), (snapshot) => {
            const data = snapshot.val() || {};
            const config = data.config || {};
            const isBanned = user && data.banned && data.banned[user.email.replace(/\./g, '_')];

            // 1. 維護模式檢查
            if (config.maintenance && !isAdmin) {
                document.getElementById('maintenance-msg').style.display = 'block';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('lock-screen').style.display = 'none';
                return;
            }

            // 2. 登入檢查
            document.getElementById('maintenance-msg').style.display = 'none';
            document.getElementById('lock-screen').style.display = isAuth ? 'none' : 'block';
            document.getElementById('main-content').style.display = isAuth ? 'block' : 'none';
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';

            // 3. 渲染貼文
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            if(data.posts) {
                Object.keys(data.posts).reverse().forEach(id => {
                    const p = data.posts[id];
                    let commentUI = config.disableComments ? "<p style='color:red; font-size:12px;'>🚫 管理員已關閉留言功能</p>" : 
                                    isBanned ? "<p style='color:red; font-size:12px;'>🔇 您已被管理員禁言</p>" :
                                    `<div class="control-group"><input id="i-${id}" placeholder="留言..."><button onclick="sendMsg('${id}')">送出</button></div>`;
                    
                    feed.innerHTML += `
                        <div class="post-card">
                            <small>📅 ${p.time}</small>
                            <p>${p.text}</p>
                            <div class="comment-box" id="c-${id}"></div>
                            ${commentUI}
                        </div>`;
                });
            }
        });
    });

    window.sendMsg = (id) => {
        const val = document.getElementById(`i-${id}`).value;
        if(val) push(ref(db, `comments/${id}`), { text: val, user: auth.currentUser.email });
    };
</script>
</body>
</html>
