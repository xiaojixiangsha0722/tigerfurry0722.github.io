<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden - 系統安全檢查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-dot {
            animation: pulse 1.5s infinite;
        }
        .login-modal {
            backdrop-filter: blur(4px);
        }
        /* 旋轉動畫 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
        /* 漸變進入效果 */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4 font-sans text-gray-700 relative">

    <!-- 1. 系統正在驗證您的瀏覽器 過場畫面 -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center space-y-4">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-blue-500 rounded-full spinner"></div>
        <div class="text-center">
            <h2 class="text-xl font-bold text-gray-800">系統正在驗證您的瀏覽器</h2>
            <p class="text-gray-400 text-sm mt-2">請耐心等候一下，這可能需要幾秒鐘...</p>
        </div>
        <p class="text-[10px] text-gray-300 font-mono absolute bottom-10 tracking-widest uppercase">Security Layer v4.0.12</p>
    </div>

    <!-- 2. 攔截主畫面 -->
    <div id="block-screen" class="hidden max-w-md w-full bg-white shadow-2xl rounded-2xl p-8 border border-gray-100 text-center fade-in">
        <div class="flex justify-center mb-8">
            <div class="bg-red-50 p-5 rounded-full ring-8 ring-red-50/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 mb-2">發生錯誤</h1>
        <div class="h-1.5 w-16 bg-red-500 mx-auto rounded-full mb-8"></div>

        <div class="space-y-6 text-left">
            <p class="text-lg text-gray-600 font-medium text-center leading-relaxed">
                **很抱歉，因無法驗證您不是機器人，您的請求已被攔截。**
            </p>
            
            <div class="bg-gray-50 border-l-4 border-red-500 p-4 rounded-r-lg">
                <p class="text-xs text-gray-500 font-mono leading-loose">
                    [系統報告]<br>
                    狀態碼: 403 Forbidden<br>
                    原因: 非人類行為檢測異常 (Bot_Detection_v4)<br>
                    **您的 IP 地址已記錄在案。**
                </p>
            </div>

            <div class="text-center mt-8">
                <p class="text-xs text-gray-400 mb-2 font-semibold uppercase tracking-widest">申訴與支援</p>
                <a href="mailto:hehans1108perdonal@proton.me" class="text-blue-500 hover:text-blue-700 font-mono text-sm underline decoration-2 underline-offset-4">
                    hehans1108perdonal@proton.me
                </a>
            </div>
        </div>

        <!-- 管理員繞過驗證按鈕 (放在最下方) -->
        <div class="mt-10 pt-6 border-t border-gray-100">
            <button onclick="toggleLoginModal()" class="text-[10px] text-gray-300 hover:text-blue-400 transition-all uppercase tracking-widest px-4 py-2 hover:bg-gray-50 rounded-lg">
                使用支援郵件提供的帳號密碼來繞過驗證
            </button>
        </div>
    </div>

    <!-- 3. 登入成功後的主畫面 -->
    <div id="admin-screen" class="hidden max-w-4xl w-full bg-white shadow-xl rounded-2xl p-12 border border-gray-100 fade-in">
        <div class="flex items-center justify-between mb-8 border-b pb-4">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white font-bold">A</div>
                <h2 class="text-2xl font-bold text-gray-800">管理後台</h2>
            </div>
            <button onclick="handleLogout()" class="bg-red-50 text-red-500 px-4 py-1.5 rounded-full text-xs font-bold hover:bg-red-100 transition-colors">登出系統</button>
        </div>
        <div class="flex flex-col items-center justify-center py-24 border-2 border-dashed border-gray-100 rounded-3xl bg-gray-50/50">
            <div class="bg-white p-6 rounded-full shadow-sm mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <p class="text-gray-400 font-medium text-lg italic">**暫無貼文**</p>
            <p class="text-gray-300 text-sm mt-2">目前沒有任何內容需要處理</p>
        </div>
    </div>

    <!-- 4. 登入 Modal -->
    <div id="login-modal" class="hidden fixed inset-0 login-modal bg-black/60 flex items-center justify-center p-4 z-[110]">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-50 text-blue-600 rounded-xl mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 tracking-tight">管理員認證</h3>
                <p class="text-xs text-gray-400 mt-1">請輸入由技術支援提供的憑據</p>
            </div>
            <form onsubmit="event.preventDefault(); handleLogin();" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Email Address</label>
                    <input type="email" id="email" autocomplete="email" placeholder="電子郵件" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Security Password</label>
                    <input type="password" id="password" autocomplete="current-password" placeholder="密碼" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button type="submit" id="login-submit" class="w-full bg-blue-600 text-white py-3.5 rounded-2xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-95 mt-2">
                    認證並繞過
                </button>
                <button type="button" onclick="toggleLoginModal()" class="w-full text-gray-400 text-xs py-2 hover:text-gray-600 transition-colors">返回攔截頁面</button>
            </form>
            <p id="login-error" class="text-red-500 text-xs mt-4 text-center hidden font-medium px-4 py-2 bg-red-50 rounded-lg italic"></p>
        </div>
    </div>

    <script>
        // --- Firebase 設定區 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB_S4O6H7z_P9jK2L3M4N5O6P7Q8R9S0", 
            authDomain: "furmony-web.firebaseapp.com",
            projectId: "furmony-web",
            storageBucket: "furmony-web.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef123456"
        };

        let auth;

        window.onload = function() {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 500);
                initFirebase();
            }, 3000);
        };

        function initFirebase() {
            try {
                if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "") {
                    firebase.initializeApp(firebaseConfig);
                    auth = firebase.auth();
                    
                    auth.onAuthStateChanged((user) => {
                        const blockScreen = document.getElementById('block-screen');
                        const adminScreen = document.getElementById('admin-screen');

                        if (user) {
                            blockScreen.style.display = 'none';
                            adminScreen.classList.remove('hidden');
                        } else {
                            blockScreen.style.display = 'block';
                            adminScreen.classList.add('hidden');
                        }
                    });
                } else {
                    document.getElementById('block-screen').style.display = 'block';
                }
            } catch (e) {
                console.error("Firebase 初始化失敗:", e);
                document.getElementById('block-screen').style.display = 'block';
            }
        }

        function toggleLoginModal() {
            const modal = document.getElementById('login-modal');
            modal.classList.toggle('hidden');
            document.getElementById('login-error').classList.add('hidden');
        }

        async function handleLogin() {
            if (!auth) {
                alert("!!Firebase 未能正確初始化，請檢查 API Key!!");
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorLabel = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit');

            if (!email || !password) {
                errorLabel.innerText = "請輸入管理員憑據";
                errorLabel.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "驗證中...";
            errorLabel.classList.add('hidden');

            try {
                await auth.signInWithEmailAndPassword(email, password);
                toggleLoginModal();
            } catch (error) {
                console.error(error.code);
                // 處理帳號停用邏輯
                if (error.code === 'auth/user-disabled') {
                    errorLabel.innerText = "很抱歉 您的帳號無效 請聯絡:hehans1108personal@proton.me";
                } else {
                    errorLabel.innerText = "!!權限驗證失敗：無效的憑據!!";
                }
                errorLabel.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "認證並繞過";
            }
        }

        function handleLogout() {
            if (auth) {
                auth.signOut().then(() => location.reload());
            }
        }
    </script>
</body>
</html>
